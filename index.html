<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dünya Tahmin Oyunu</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:'Segoe UI',Arial;overflow:hidden;}
#map{height:100vh;cursor:crosshair;}

/* ANA MENÜ STİLLERİ BAŞLANGIÇ */
#main-menu {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    /* Arka planı karartmak için rgba, pus için backdrop-filter kullanıyoruz */
    background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.8)), url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1920&q=80') center/cover;
    backdrop-filter: blur(8px);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    transition: opacity 1s ease, visibility 1s ease; /* Animasyonlu geçiş */
}

.menu-title {
    font-size: 5rem;
    margin: 0;
    text-shadow: 0 5px 15px rgba(0,0,0,0.5);
    letter-spacing: 2px;
}

.menu-subtitle {
    font-size: 1.5rem;
    margin-top: 10px;
    margin-bottom: 30px;
    opacity: 0.9;
}

.start-btn {
    background: #ffcc00;
    color: #111;
    padding: 15px 50px;
    font-size: 24px;
    border: none;
    border-radius: 40px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 8px 25px rgba(255, 204, 0, 0.4);
    transition: transform 0.2s, background 0.2s;
}

.start-btn:hover {
    transform: scale(1.05);
    background: #ffe066;
}

.rules-text {
    position: absolute;
    bottom: 40px;
    width: 90%;
    max-width: 800px;
    text-align: center;
    font-size: 1.1rem;
    color: #e0e0e0;
    line-height: 1.5;
    background: rgba(0, 0, 0, 0.5);
    padding: 15px;
    border-radius: 10px;
}
/* ANA MENÜ STİLLERİ BİTİŞ */

.top-bar{
position:absolute;top:0;left:0;width:100%;
display:flex;justify-content:space-between;align-items:center;
padding:15px 25px;box-sizing:border-box;z-index:1000;
pointer-events:none;
}

.city-box{background:#ffcc00;padding:12px 20px;border-radius:12px;font-weight:bold;pointer-events:auto;}
.score-box{background:#00c853;color:white;padding:12px 20px;border-radius:12px;font-weight:bold;pointer-events:auto;min-width:120px;text-align:center;}

.timer-box{
position:absolute;top:15px;left:50%;transform:translateX(-50%);
background:#ff3d00;color:white;padding:12px 25px;border-radius:20px;
font-size:20px;font-weight:bold;z-index:1000;
}

.distance-box{
position:absolute;top:75px;left:50%;transform:translateX(-50%);
background:#2962ff;color:white;padding:10px 25px;border-radius:20px;
font-weight:bold;z-index:1000;display:none;
}

.bottom-bar{
position:absolute;bottom:30px;left:50%;transform:translateX(-50%);
z-index:1000;
}

button{
padding:14px 35px;font-size:16px;border:none;border-radius:30px;
background:#2962ff;color:white;cursor:pointer;font-weight:bold;
}

.result-box{
position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
background:white;padding:30px;border-radius:20px;
z-index:2000;display:none;max-height:80vh;overflow-y:auto;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
width:90%;max-width:600px;
}

.score-table{
width:100%;border-collapse:collapse;margin-top:15px;
}

.score-table th{
background:#2962ff;color:white;padding:8px;
}

.score-table td{
padding:8px;text-align:center;
}

.score-table tr:nth-child(even){
background:#f2f2f2;
}
</style>
</head>
<body>

<div id="main-menu">
    <h1 class="menu-title">Week.world</h1>
    <p class="menu-subtitle">oynamak için tıkla:</p>
    <button class="start-btn" onclick="startGame()">Başla</button>
    <div class="rules-text">
        <strong>Kurallar:</strong> Google kullanmak yasaktır! Amaç ise ekranda yazan şehir ismini haritada bulup işaretlemektir!
    </div>
</div>
<div class="top-bar">
<div class="city-box">
Seçili Şehir: <span id="cityName"></span>
</div>
<div class="score-box">
Puan: <span id="score">0</span>
</div>
</div>

<div class="timer-box" id="timer">02:00</div>
<div class="distance-box" id="distanceBox"></div>

<div class="bottom-bar">
<button onclick="makeGuess()">TAHMİN ET</button>
</div>

<div class="result-box" id="result"></div>
<div id="map"></div>

<script>
var map=L.map('map').setView([20,0],2);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

var cities=[
["Ankara",39.9334,32.8597],["Berlin",52.52,13.405],
["Madrid",40.4168,-3.7038],["Roma",41.9028,12.4964],
["Atina",37.9838,23.7275],["Paris",48.8566,2.3522],
["Londra",51.5074,-0.1278],["Tokyo",35.6762,139.6503],
["New York",40.7128,-74.0060],["Rio",-22.9068,-43.1729],
["Toronto",43.6532,-79.3832],["Meksiko",19.4326,-99.1332],
["Buenos Aires",-34.6037,-58.3816],["Cape Town",-33.9249,18.4241],
["Sidney",-33.8688,151.2093],["Moskova",55.7558,37.6173],
["Dubai",25.2048,55.2708],["Tahran",35.6892,51.3890],
["Nairobi",-1.2921,36.8219],["Santiago",-33.4489,-70.6693],
["Jakarta",-6.2088,106.8456],["Delhi",28.7041,77.1025],
["Pekin",39.9042,116.4074],["Seul",37.5665,126.978],
["Bangkok",13.7563,100.5018],["Oslo",59.9139,10.7522],
["Stockholm",59.3293,18.0686],["Helsinki",60.1699,24.9384],
["Varşova",52.2297,21.0122],["Lizbon",38.7223,-9.1393],
["Kahire",30.0444,31.2357],["İstanbul",41.0082,28.9784],
["Los Angeles",34.0522,-118.2437],["Chicago",41.8781,-87.6298],
["Miami",25.7617,-80.1918],["Viyana",48.2082,16.3738],
["Brüksel",50.8503,4.3517],["Amsterdam",52.3676,4.9041],
["Prag",50.0755,14.4378],["Budapeşte",47.4979,19.0402],
["Kopenhag",55.6761,12.5683],["Atina2",38.0,23.8],
["Reykjavik",64.1466,-21.9426],["Doha",25.2854,51.5310],
["Riyad",24.7136,46.6753],["Karachi",24.8607,67.0011],
["Lahor",31.5204,74.3587],["Manila",14.5995,120.9842],
["Hong Kong",22.3193,114.1694],["Taipei",25.0330,121.5654],
["Kuala Lumpur",3.1390,101.6869],["Hanoi",21.0278,105.8342],
["Lima",-12.0464,-77.0428],["Bogota",4.7110,-74.0721],
["Caracas",10.4806,-66.9036],["Panama",8.9824,-79.5199],
["Havana",23.1136,-82.3666],["Montreal",45.5017,-73.5673],
["San Francisco",37.7749,-122.4194],["Houston",29.7604,-95.3698],
["Auckland",-36.8485,174.7633],["Melbourne",-37.8136,144.9631],
["Brisbane",-27.4698,153.0251],["Perth",-31.9505,115.8605]
];

var selectedCity;
var lastCityIndex=-1;
var guessMarker=null;
var realMarker=null;
var line=null;

var score=0;
var timerInterval;
var timeLeft=120;
var roundActive=false; // Oyunu başta aktif etmemek için false yaptık
var roundHistory=[];
const MAX_SCORE=25000;

// YENİ EKLENEN ANA MENÜ BAŞLATMA FONKSİYONU
function startGame() {
    var menu = document.getElementById('main-menu');
    menu.style.opacity = '0'; // Animasyonlu yok olma
    menu.style.visibility = 'hidden';
    
    // Geçiş animasyonu bittikten hemen sonra oyunu başlat
    setTimeout(function() {
        map.invalidateSize(); // Haritanın düzgün yüklenmesini sağlar
        startRound();
    }, 1000); // 1 saniyelik CSS transition süresi
}

function startRound(){
if(score>=MAX_SCORE)return;

if(guessMarker){map.removeLayer(guessMarker);guessMarker=null;}
if(realMarker){map.removeLayer(realMarker);realMarker=null;}
if(line){map.removeLayer(line);line=null;}

document.getElementById("distanceBox").style.display="none";

var index;
do{
index=Math.floor(Math.random()*cities.length);
}while(index===lastCityIndex);

lastCityIndex=index;
selectedCity=cities[index];

document.getElementById("cityName").innerText=selectedCity[0];

timeLeft=120;
roundActive=true;
updateTimer();

clearInterval(timerInterval);
timerInterval=setInterval(function(){
timeLeft--;
updateTimer();
if(timeLeft<=0){
clearInterval(timerInterval);
endRound();
}
},1000);
}

function updateTimer(){
var m=String(Math.floor(timeLeft/60)).padStart(2,'0');
var s=String(timeLeft%60).padStart(2,'0');
document.getElementById("timer").innerText=m+":"+s;
}

map.on("click",function(e){
if(!roundActive)return;
if(guessMarker)map.removeLayer(guessMarker);
guessMarker=L.marker(e.latlng).addTo(map);
});

function makeGuess(){
if(!roundActive)return;
clearInterval(timerInterval);
endRound();
}

function endRound(){
if(!guessMarker){startRound();return;}

roundActive=false;

var realLatLng=L.latLng(selectedCity[1],selectedCity[2]);
realMarker=L.marker(realLatLng).addTo(map);

var guessLatLng=guessMarker.getLatLng();

line=L.polyline([guessLatLng,realLatLng],{color:'red',weight:3}).addTo(map);

var distance=map.distance(guessLatLng,realLatLng)/1000;
var roundScore=Math.max(0,Math.floor(5000-distance*5));
score+=roundScore;

roundHistory.push({
city:selectedCity[0],
distance:Math.round(distance),
roundScore:roundScore
});

document.getElementById("score").innerText=score;
document.getElementById("distanceBox").innerText=Math.round(distance)+" km uzaklık";
document.getElementById("distanceBox").style.display="block";

if(score>=MAX_SCORE){
showFinalScreen();
return;
}

var countdown=10;
var countdownInterval=setInterval(function(){
document.getElementById("timer").innerText="Yeni Tur: "+countdown;
countdown--;
if(countdown<0){
clearInterval(countdownInterval);
startRound();
}
},1000);
}

function showFinalScreen(){
clearInterval(timerInterval);

var resultBox=document.getElementById("result");
resultBox.style.display="block";

let html="<h2 style='text-align:center;color:#2962ff;'>OYUN BİTTİ</h2>";
html+="<h3 style='text-align:center;'>Toplam Puan: "+score+"</h3>";

html+="<table class='score-table'>";
html+="<tr><th>#</th><th>Şehir</th><th>Mesafe</th><th>Puan</th></tr>";

roundHistory.forEach(function(r,i){
html+="<tr><td>"+(i+1)+"</td><td>"+r.city+"</td><td>"+r.distance+" km</td><td>"+r.roundScore+"</td></tr>";
});

html+="</table><br>";
html+="<div style='text-align:center;'><button onclick='restartGame()'>TEKRAR OYNA</button></div>";

resultBox.innerHTML=html;
}

function restartGame(){
score=0;
roundHistory=[];
document.getElementById("score").innerText=0;
document.getElementById("result").style.display="none";
startRound();
}

// Burada eskiden otomatik çalışan startRound() fonksiyonunu sildik. 
// Artık sadece "Başla" butonuna tıklandığında startGame() tarafından çağrılacak.

</script>

</body>
</html>
